        function _openTradeStats(statType, startId, endId, btnId) {
            const start = _normalizeUtc8Input(document.getElementById(startId)?.value || '');
            const end = _normalizeUtc8Input(document.getElementById(endId)?.value || '');
            const btn = document.getElementById(btnId);
            if (!start || !end || end < start) return;
            if (btn) btn.disabled = true;
            fetchJsonSafe('/api/5m_trade_stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    stat_type: statType,
                    start_time: start,
                    end_time: end,
                }),
            })
                .then(data => {
                    if (data.error) {
                        _showTradeStatsModal('统计结果', '<div class="alert alert-warning mb-0">' + data.error + '</div>');
                        return;
                    }
                    if (statType === 'history') {
                        let html = '<div class="small text-muted mb-2">时间范围（UTC+8）：' + start.replace('T', ' ') + ' ~ ' + end.replace('T', ' ') + '</div>';
                        html += '<div class="table-responsive"><table class="table table-sm table-bordered mb-0"><tbody>';
                        html += '<tr><th>净盈利值</th><td>' + _fmt2(data.net_pnl) + '</td></tr>';
                        html += '<tr><th>交易窗口数</th><td>' + (data.trade_window_count ?? '--') + '</td></tr>';
                        html += '<tr><th>交易窗口比例</th><td>' + _fmtPct(data.trade_window_ratio) + '</td></tr>';
                        html += '<tr><th>盈利窗口数</th><td>' + (data.profit_window_count ?? '--') + '</td></tr>';
                        html += '<tr><th>亏损窗口数</th><td>' + (data.loss_window_count ?? '--') + '</td></tr>';
                        html += '<tr><th>盈利比例</th><td>' + _fmtPct(data.win_rate) + '</td></tr>';
                        html += '<tr><th>盈利窗口的盈利数</th><td>' + _fmt2(data.profit_amount) + '</td></tr>';
                        html += '<tr><th>亏损窗口的亏损数</th><td>' + _fmt2(data.loss_amount) + '</td></tr>';
                        html += '<tr><th>盈利窗口的平均盈利</th><td>' + _fmt2(data.avg_profit) + '</td></tr>';
                        html += '<tr><th>亏损窗口的平均亏损</th><td>' + _fmt2(data.avg_loss) + '</td></tr>';
                        html += '</tbody></table></div>';
                        _showTradeStatsModal('历史交易统计', html);
                        return;
                    }
                    let html = '<div class="small text-muted mb-2">时间范围（UTC+8）：' + start.replace('T', ' ') + ' ~ ' + end.replace('T', ' ') + '</div>';
                    html += '<div class="table-responsive mb-3"><table class="table table-sm table-bordered mb-0"><tbody>';
                    html += '<tr><th>跳过窗口总数</th><td>' + (data.skip_window_count ?? '--') + '</td></tr>';
                    html += '<tr><th>跳过窗口比例</th><td>' + _fmtPct(data.skip_window_ratio) + '</td></tr>';
                    html += '<tr><th>预测正确窗口数</th><td>' + (data.total_correct ?? '--') + '</td></tr>';
                    html += '<tr><th>预测错误窗口数</th><td>' + (data.total_wrong ?? '--') + '</td></tr>';
                    html += '<tr><th>预测总正确率</th><td>' + _fmtPct(data.prediction_accuracy) + '</td></tr>';
                    html += '</tbody></table></div>';
                    html += '<div class="table-responsive"><table class="table table-sm table-bordered mb-0"><thead><tr><th>跳过原因分类</th><th>数量</th><th>比例</th><th>预测正确</th><th>预测错误</th><th>正确率</th><th>检查链</th></tr></thead><tbody>';
                    const reasons = Array.isArray(data.reasons) ? data.reasons : [];
                    const _lvlColors = {early:'danger',middle:'warning',late:'info',execution:'success'};
                    const _lvlLabels = {early:'前端',middle:'中段',late:'后端',execution:'执行'};
                    if (!reasons.length) {
                        html += '<tr><td colspan="7" class="text-muted">该时间段无跳过记录</td></tr>';
                    } else {
                        reasons.forEach((r, idx) => {
                            const sa = r.sub_analysis;
                            const hasDetail = sa && ((Array.isArray(sa.breakdown) && sa.breakdown.length > 0) || sa.what_if_note);

                            html += '<td>' + _fmtPct(r.prediction_accuracy) + '</td>';

                                    html += '<th>' + _escapeHtml(sa.breakdown_key || '子分类') + '</th>';
                                    html += '<th>数量</th><th>预测正确</th><th>预测错误</th><th>正确率</th></tr></thead><tbody>';
                                    sa.breakdown.forEach(b => {
                                        html += '<tr><td>' + _escapeHtml(b.label || '--') + '</td>';
                                        html += '<td>' + (b.count ?? '--') + '</td>';
                                        html += '<td>' + (b.correct ?? '--') + '</td>';
                                        html += '<td>' + (b.wrong ?? '--') + '</td>';
                                        html += '<td>' + _fmtPct(b.accuracy) + '</td></tr>';
                                    });
                                    html += '</tbody></table>';
                                }
                                html += '</td></tr>';
                            }
                        });
                    }
                    html += '</tbody></table></div>';
                    _showTradeStatsModal('跳过窗口统计', html);
                })
                .catch(error => {
                    _showTradeStatsModal('统计结果', '<div class="alert alert-danger mb-0">统计失败: ' + error + '</div>');

        function _drawPnlChart(series) {
            if (!Array.isArray(series) || series.length === 0) {
                return '<div class="text-muted p-3">暂无已实现盈亏曲线数据</div>';
            }
            let points = [...series];
            if (points.length > 800) {
                const step = Math.ceil(points.length / 800);
                points = points.filter((_, idx) => idx % step === 0 || idx === points.length - 1);
            }
            const values = points.map(p => Number(p.pnl)).filter(v => !isNaN(v));
            if (values.length === 0) {
                return '<div class="text-muted p-3">暂无有效盈亏数据</div>';
            }
            const minV = Math.min(...values);
            const maxV = Math.max(...values);
            const span = Math.max(0.0001, maxV - minV);
            const W = 900;
            const H = 260;
            const padL = 56;
            const padR = 16;
            const padT = 16;
            const padB = 28;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;

            const chartPoints = points.map((p, i) => {
                const x = padL + (i * plotW / Math.max(1, points.length - 1));
                const y = padT + (maxV - Number(p.pnl)) * plotH / span;
                return {
                    x: x.toFixed(2),
                    y: y.toFixed(2),
                    pnl: Number(p.pnl),
                    delta_pnl: Number(p.delta_pnl),
                    slug: p.window_slug || '--',
                    ts: p.ts,
                };
            });
            const xy = chartPoints.map(p => `${p.x},${p.y}`).join(' ');
            const dots = chartPoints.map(p => {
                const tipTime = _fmtUtc8DateTime(p.ts);
                const tipVal = _fmt2(p.pnl);
                const tipDelta = _fmt2(p.delta_pnl);
                const tipDeltaSigned = (Number(p.delta_pnl) >= 0 ? '+' : '') + tipDelta;
                const tipCumSigned = (Number(p.pnl) >= 0 ? '+' : '') + tipVal;
                return `
                    <circle class="trade-chart-dot" cx="${p.x}" cy="${p.y}" r="3.2">
                        <title>时间(UTC+8): ${tipTime}
窗口: ${p.slug}
累计盈亏: ${tipCumSigned} USDC
单笔盈亏: ${tipDeltaSigned} USDC</title>
                    </circle>
                `;
            }).join('');

            const lastVal = Number(points[points.length - 1].pnl);
            const lastText = (lastVal >= 0 ? '+' : '') + _fmt2(lastVal);
            const yMin = (padT + plotH).toFixed(2);
            const yMax = padT.toFixed(2);
            return `
                <svg class="trade-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
                    <line x1="${padL}" y1="${yMin}" x2="${W - padR}" y2="${yMin}" stroke="#e9ecef" stroke-width="1" />
                    <line x1="${padL}" y1="${yMax}" x2="${W - padR}" y2="${yMax}" stroke="#e9ecef" stroke-width="1" />
                    <line x1="${padL}" y1="${((padT + plotH / 2).toFixed(2))}" x2="${W - padR}" y2="${((padT + plotH / 2).toFixed(2))}" stroke="#f1f3f5" stroke-width="1" />
                    <polyline fill="none" stroke="#0d6efd" stroke-width="2.5" points="${xy}" />
                    ${dots}
                    <text x="10" y="${yMax}" font-size="12" fill="#6c757d">${_fmt2(maxV)}</text>
                    <text x="10" y="${yMin}" font-size="12" fill="#6c757d">${_fmt2(minV)}</text>
                    <text x="${W - 200}" y="18" font-size="12" fill="#0d6efd">最新累计: ${lastText} USDC</text>
                </svg>
            `;
        }

        function _drawBtcDiffChart(prices, openPrice, exitRelSec) {
            if (!Array.isArray(prices) || prices.length < 2) {
                return '<div class="text-muted p-3">暂无秒级BTC价格数据</div>';
            }
            if (openPrice == null) openPrice = prices[0].btc_price;
            let points = prices.map(p => ({
                sec: p.rel_sec,
                diff: p.btc_price - openPrice,
            }));
            // 降采样保证渲染效率
            if (points.length > 600) {
                const step = Math.ceil(points.length / 600);
                points = points.filter((_, i) => i % step === 0 || i === points.length - 1);
            }
            const diffs = points.map(p => p.diff);
            const secs = points.map(p => p.sec);
            const minD = Math.min(...diffs);
            const maxD = Math.max(...diffs);
            const span = Math.max(0.01, maxD - minD);
            const minSec = Math.min(...secs);
            const maxSec = Math.max(Math.max(...secs), 300);
            const secSpan = Math.max(1, maxSec - minSec);

            const W = 840, H = 300;
            const padL = 66, padR = 20, padT = 24, padB = 44;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;

            const toX = sec => padL + (sec - minSec) * plotW / secSpan;
            const toY = diff => padT + (maxD - diff) * plotH / span;

            const xy = points.map(p => `${toX(p.sec).toFixed(1)},${toY(p.diff).toFixed(1)}`).join(' ');

            // 零线
            const zeroY = toY(0).toFixed(1);
            const zeroInRange = minD <= 0 && maxD >= 0;

            // 每5秒竖线网格
            let checkpointLines = '';
            let checkpointLabels = '';
            for (let s = Math.ceil(minSec / 5) * 5; s <= maxSec; s += 5) {
                if (s >= minSec && s <= maxSec) {
                    const cx = toX(s).toFixed(1);
                    const isMajor = s % 15 === 0;
                    const sw = isMajor ? '1' : '0.7';
                    const clr = isMajor ? '#adb5bd' : '#ced4da';
                    checkpointLines += `<line x1="${cx}" y1="${padT}" x2="${cx}" y2="${padT + plotH}" stroke="${clr}" stroke-width="${sw}" stroke-dasharray="3,3" />`;
                    if (isMajor) {
                        checkpointLabels += `<text x="${cx}" y="${padT + plotH + 18}" font-size="10" fill="#6c757d" text-anchor="middle">${s}s</text>`;
                    }
                }
            }

            // X轴刻度 (每60秒，粗刻度 — 跳过已被15s网格标注的)
            let xTicks = '';
            for (let s = 0; s <= maxSec; s += 60) {
                if (s >= minSec && s <= maxSec) {
                    const tx = toX(s).toFixed(1);
                    xTicks += `<line x1="${tx}" y1="${padT + plotH}" x2="${tx}" y2="${padT + plotH + 5}" stroke="#adb5bd" stroke-width="1" />`;
                    if (s % 15 !== 0) {
                        xTicks += `<text x="${tx}" y="${padT + plotH + 18}" font-size="11" fill="#6c757d" text-anchor="middle">${s}s</text>`;
                    }
                }
            }

            // Y轴刻度
            const ySteps = 5;
            let yTicks = '';
            for (let i = 0; i <= ySteps; i++) {
                const val = minD + (span * i / ySteps);
                const yy = toY(val).toFixed(1);
                yTicks += `<line x1="${padL - 4}" y1="${yy}" x2="${padL + plotW}" y2="${yy}" stroke="#f1f3f5" stroke-width="1" />`;
                yTicks += `<text x="${padL - 8}" y="${Number(yy) + 4}" font-size="11" fill="#6c757d" text-anchor="end">${val >= 0 ? '+' : ''}${val.toFixed(1)}</text>`;
            }

            // 出场时间竖线
            let exitLine = '';
            if (exitRelSec != null && exitRelSec >= minSec && exitRelSec <= maxSec) {
                const ex = toX(exitRelSec).toFixed(1);
                exitLine = `<line x1="${ex}" y1="${padT}" x2="${ex}" y2="${padT + plotH}" stroke="#e83e8c" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.85" />`;
                exitLine += `<text x="${ex}" y="${padT - 6}" font-size="10" fill="#e83e8c" text-anchor="middle">出场 ${exitRelSec}s</text>`;
            }

            return `
                <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:340px;display:block;">
                    ${yTicks}
                    ${zeroInRange ? `<line x1="${padL}" y1="${zeroY}" x2="${padL + plotW}" y2="${zeroY}" stroke="#adb5bd" stroke-width="1" stroke-dasharray="6,3" />` : ''}
                    ${checkpointLines}
                    ${exitLine}
                    <polyline fill="none" stroke="#0d6efd" stroke-width="2" stroke-linejoin="round" points="${xy}" />
                    ${xTicks}
                    ${checkpointLabels}
                    <text x="${W / 2}" y="${H - 28}" font-size="11" fill="#6c757d" text-anchor="middle">窗口时间 (秒)</text>
                    <text x="14" y="${padT + plotH / 2}" font-size="11" fill="#6c757d" text-anchor="middle" transform="rotate(-90, 14, ${padT + plotH / 2})">BTC 差值</text>
                </svg>
            `;
        }

            html += '<div class="d-flex align-items-center gap-2 flex-nowrap">';
            html += '<input type="datetime-local" class="form-control form-control-sm" style="width: 190px;" id="historyStatStart" value="' + _escapeHtml(tradeHistoryStatStart) + '" oninput="onHistoryStatInputChanged()" />';
            html += '<input type="datetime-local" class="form-control form-control-sm" style="width: 190px;" id="historyStatEnd" value="' + _escapeHtml(tradeHistoryStatEnd) + '" oninput="onHistoryStatInputChanged()" />';
            html += '<button class="btn btn-sm btn-outline-primary" id="historyStatBtn" onclick="openHistoryStats()" disabled>统计</button>';
            html += '<select class="form-select form-select-sm" style="width: 110px;" id="historyResultFilter" onchange="onHistoryResultFilterChanged()">';
            html += '<option value="all"' + (tradeResultFilter === 'all' ? ' selected' : '') + '>全部</option>';
            html += '<option value="盈利"' + (tradeResultFilter === '盈利' ? ' selected' : '') + '>盈利</option>';
            html += '<option value="亏损"' + (tradeResultFilter === '亏损' ? ' selected' : '') + '>亏损</option>';
            html += '<option value="未定"' + (tradeResultFilter === '未定' ? ' selected' : '') + '>未定</option>';
            html += '</select>';
            html += '</div></div>';
            html += '<div class="table-responsive"><table class="table table-sm table-bordered align-middle mb-0">';
            html += '<thead><tr><th>窗口slug</th><th>UTC+8时间</th><th>结果</th><th>入场价格</th><th>入场token量</th><th>入场金额</th><th>出场价格</th><th>出场金额</th><th>利润</th></tr></thead>';
            html += '<tbody>' + tableRows + '</tbody></table></div>';
            html += _buildPager(hPage.total, hPage.current, 'gotoTradeHistoryPage');

            html += '<div class="d-flex align-items-center gap-2 mt-4 mb-2">';
            html += '<h3 class="h5 mb-0 me-2">跳过窗口及原因</h3>';
            html += '<div class="d-flex align-items-center gap-2 flex-nowrap">';
            html += '<input type="datetime-local" class="form-control form-control-sm" style="width: 190px;" id="skipStatStart" value="' + _escapeHtml(tradeSkipStatStart) + '" oninput="onSkipStatInputChanged()" />';
            html += '<input type="datetime-local" class="form-control form-control-sm" style="width: 190px;" id="skipStatEnd" value="' + _escapeHtml(tradeSkipStatEnd) + '" oninput="onSkipStatInputChanged()" />';
            html += '<button class="btn btn-sm btn-outline-primary" id="skipStatBtn" onclick="openSkipStats()" disabled>统计</button>';
            html += '<select class="form-select form-select-sm" style="width: 110px;" id="skipPredFilter" onchange="onSkipPredFilterChanged()">';
            html += '<option value="all"' + (skipPredFilter === 'all' ? ' selected' : '') + '>全部</option>';
            html += '<option value="correct"' + (skipPredFilter === 'correct' ? ' selected' : '') + '>预测正确</option>';
            html += '<option value="wrong"' + (skipPredFilter === 'wrong' ? ' selected' : '') + '>预测错误</option>';
            html += '<option value="unknown"' + (skipPredFilter === 'unknown' ? ' selected' : '') + '>未知</option>';
            html += '</select>';
            html += '</div></div>';
            html += '<div class="table-responsive"><table class="table table-sm table-bordered align-middle mb-0">';
            html += '<thead><tr><th>窗口slug</th><th>UTC+8时间</th><th>预测方向</th><th>实际方向</th><th>跳过原因</th></tr></thead>';
            html += '<tbody>' + skipRows + '</tbody></table></div>';
            html += _buildPager(sPage.total, sPage.current, 'gotoTradeSkipPage');

            document.getElementById('trade5m-content').innerHTML = html;
            _updateChartRangeBtnState();
            updateHistoryStatsBtnState();
            updateSkipStatsBtnState();
        }

        function gotoTradeHistoryPage(page) {
            tradeHistoryPage = page;
            render5mTradeTab(tradeCurrentBalance);
        }

        function gotoTradeSkipPage(page) {
            tradeSkipPage = page;
            render5mTradeTab(tradeCurrentBalance);
        }

        function load5mTradeTab() {
            fetchJsonSafe('/api/5m_trade_summary')
                .then(data => {
                    if (data.error) {
                        document.getElementById('trade5m-content').innerHTML = '<div class="alert alert-warning">' + data.error + '</div>';
                        return;
                    }
                    tradeHistoryRowsData = Array.isArray(data.history) ? data.history : [];
                    tradeSkipRowsData = Array.isArray(data.skipped_windows) ? data.skipped_windows : [];
                    tradeMetricStartUtc = String(data.metric_start_utc || '').trim();
                    const balanceSeriesRows = Array.isArray(data.balance_series) ? data.balance_series : [];
                    tradePnlSeriesData = _buildTradePnlSeriesFromBalance(balanceSeriesRows);
                    if (tradePnlSeriesData.length === 0) {
                        const pnlSourceRows = (Array.isArray(data.pnl_series) && data.pnl_series.length > 0)
                            ? data.pnl_series
                            : tradeHistoryRowsData;
                        tradePnlSeriesData = _buildTradePnlSeries(pnlSourceRows);
                    }
                    const seriesTs = tradePnlSeriesData
                        .map(p => Date.parse(String(p.ts || '')))
                        .filter(v => Number.isFinite(v));
                    if (seriesTs.length > 0) {
                        const endMs = Date.now();
                        const startMs = endMs - 24 * 3600 * 1000;
                        tradeChartStart = _toUtc8InputValueFromMs(startMs);
                        tradeChartEnd = _toUtc8InputValueFromMs(endMs);
                        tradeHistoryStatStart = _toUtc8InputValueFromMs(startMs);
                        tradeHistoryStatEnd = _toUtc8InputValueFromMs(endMs);
                        tradeSkipStatStart = _toUtc8InputValueFromMs(startMs);
                        tradeSkipStatEnd = _toUtc8InputValueFromMs(endMs);
                    } else {
                        tradeChartStart = '';
                        tradeChartEnd = '';
                        tradeHistoryStatStart = '';
                        tradeHistoryStatEnd = '';
                        tradeSkipStatStart = '';
                        tradeSkipStatEnd = '';
                    }
                    tradeHistoryPage = 1;
                    tradeSkipPage = 1;
                    tradeCurrentBalance = data.current_balance || '—';
                    tradeStrategyParams = (data.strategy_params && typeof data.strategy_params === 'object') ? data.strategy_params : {};
                    render5mTradeTab(data.current_balance || '—');
                })
                .catch(error => {
                    document.getElementById('trade5m-content').innerHTML = '<div class="alert alert-danger">加载 5m_trade 失败: ' + error + '</div>';
                });
        }

        function updateAmountOrSizeLabel() {
            const isAmount = document.getElementById('modeAmount').checked;
            const label = document.getElementById('amountOrSizeLabel');
            const hint = document.getElementById('amountOrSizeHint');
            const price = parseFloat(document.getElementById('priceInput').value);
            if (isAmount) {
                label.textContent = 'Amount ($)';
                hint.textContent = price > 0 ? 'Order size will be: amount ÷ ' + price + ' ≈ shares' : '';
            } else {
                label.textContent = 'Quantity (shares)';
                hint.textContent = price > 0 ? 'Order value will be: quantity × ' + price + ' ≈ $' : '';
            }
        }

        function openBuyModal(marketId, tokenId, price, preset) {
            currentAction = 'buy';
            currentData = {
                market_id: marketId,
                token_id: tokenId,
                recommendation_item_id: preset && preset.recommendationItemId ? preset.recommendationItemId : null,
            };
            document.getElementById('orderModalLabel').innerText = 'Create Buy Order';
            document.getElementById('priceInput').value = price;
            const inputMode = (preset && preset.inputMode) ? preset.inputMode : 'quantity';
            document.getElementById('modeAmount').checked = inputMode === 'amount';
            document.getElementById('modeQuantity').checked = inputMode !== 'amount';
            document.getElementById('amountOrSizeInput').value = (preset && preset.inputValue != null) ? preset.inputValue : '';
            document.getElementById('amountOrSizeInput').placeholder = inputMode === 'amount' ? 'Enter amount in USD' : 'Enter quantity';
            document.getElementById('amountOrSizeInput').step = '0.01';
            updateAmountOrSizeLabel();
            new bootstrap.Modal(document.getElementById('orderModal')).show();
        }

        function openSellModal(marketId, tokenId, price, preset) {
            currentAction = 'sell';
            currentData = {
                market_id: marketId,
                token_id: tokenId,
                recommendation_item_id: preset && preset.recommendationItemId ? preset.recommendationItemId : null,
            };
            document.getElementById('orderModalLabel').innerText = 'Create Sell Order';
            document.getElementById('priceInput').value = price;
            const inputMode = (preset && preset.inputMode) ? preset.inputMode : 'quantity';
            document.getElementById('modeAmount').checked = inputMode === 'amount';
            document.getElementById('modeQuantity').checked = inputMode !== 'amount';
            document.getElementById('amountOrSizeInput').value = (preset && preset.inputValue != null) ? preset.inputValue : '';
            document.getElementById('amountOrSizeInput').placeholder = inputMode === 'amount' ? 'Enter amount in USD' : 'Enter quantity';
            document.getElementById('amountOrSizeInput').step = '0.01';
            updateAmountOrSizeLabel();
            new bootstrap.Modal(document.getElementById('orderModal')).show();
        }

        function cancelOrder(orderId) {
            if (confirm('Are you sure to cancel this order?')) {
                fetchJsonSafe('/api/cancel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId })
                })
                .then(data => {
                    if (data && data.recommendation_sync_error) {
                        alert('订单已撤销，但建议状态同步失败：' + data.recommendation_sync_error
                            + '\n\n请到 Recommendations 页签手动核对该 item 的状态。');
                    } else {
                        alert('Order cancelled');
                    }
                    loadOrders();
                    loadBalance();
                })
                .catch(error => alert('取消失败: ' + error.message));
            }
        }

        document.getElementById('priceInput').addEventListener('input', updateAmountOrSizeLabel);
        document.getElementById('modeAmount').addEventListener('change', function() {
            document.getElementById('amountOrSizeInput').placeholder = this.checked ? 'Enter amount in USD' : 'Enter quantity';
            updateAmountOrSizeLabel();
        });
        document.getElementById('modeQuantity').addEventListener('change', function() {
            document.getElementById('amountOrSizeInput').placeholder = this.checked ? 'Enter quantity' : 'Enter amount in USD';
            updateAmountOrSizeLabel();
        });

        document.getElementById('submitOrder').addEventListener('click', function() {
            const submitBtn = this;
            if (submitBtn.disabled) { return; }
            const price = parseFloat(document.getElementById('priceInput').value);
            const raw = document.getElementById('amountOrSizeInput').value;
            if (!price || price <= 0 || raw === '' || isNaN(parseFloat(raw))) return;
            const isAmount = document.getElementById('modeAmount').checked;
            let size;
            if (isAmount) {
                const amount = parseFloat(raw);
                if (amount <= 0) return;
                size = Math.round(amount / price * 100) / 100;
            } else {
                size = Math.round(parseFloat(raw) * 100) / 100;
            }
            if (size <= 0) return;
            currentData.price = price;
            currentData.size = size;
            const url = currentAction === 'buy' ? '/api/buy' : '/api/sell';
            submitBtn.disabled = true;
            fetchJsonSafe(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(currentData)
            })
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    let msg = 'Order created: ' + data.order_id;
                    if (data.recommendation_sync_error) {
                        msg += '\n\n⚠️ 订单已发出，但建议状态同步失败：' + data.recommendation_sync_error
                            + '\n请到 Recommendations 页签手动核对该 item 的状态，避免重复执行。';
                    }
                    alert(msg);
                    bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
                    loadOrders();
                    loadBalance();
                }
            })
            .catch(error => alert('下单失败: ' + error.message))
            .finally(() => { submitBtn.disabled = false; });
        });

        // Load data on page load
        loadBalance();
        loadBtcPrice();
        loadEvents();
        loadPositions();
        loadOrders();
        loadRecommendationsTab();
        load5mTradeTab();

        // Refresh every 30 seconds
        setInterval(() => {
            loadBalance();
            loadBtcPrice();
            loadEvents();
            loadPositions();
            loadOrders();
            loadRecommendationsTab();
            load5mTradeTab();
        }, 30000);
    </script>
</body>
</html>
